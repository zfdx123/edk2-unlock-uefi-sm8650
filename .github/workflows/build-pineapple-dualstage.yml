name: Build Pineapple Dual-Stage UEFI (NDK Clang)

on:
  push:
    paths:
      - ".github/workflows/build-pineapple-dualstage.yml"
      - "BootShim/**"
      - "QcomModulePkg/**"
      - "docs/pineapple-dualstage-ci.md"
      - "makefile"
      - "build_boot_shim.sh"
      - "scripts/build_bootshim_payload.py"
      - "scripts/build_bootshim_stage0.py"
      - "scripts/build_our_unlock_poweroff.sh"
      - "scripts/build_pineapple_ci.sh"
      - "scripts/pack_bootimg.py"
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Git ref to build"
        required: false
        default: "main"
      boot_header_version:
        description: "Android boot header version"
        required: false
        default: "4"
      boot_cmdline:
        description: "Boot image cmdline override"
        required: false
        default: ""
  repository_dispatch:
    types:
      - build-pineapple-dualstage

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ref || github.event.inputs.target_ref || github.ref }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            uuid-dev \
            iasl \
            python3 \
            wget \
            unzip

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r24
          add-to-path: true

      - name: Build phone unlock-poweroff artifact (NDK Clang)
        env:
          TARGET_REF: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ref || github.event.inputs.target_ref || github.ref }}
          BOOT_HEADER_VERSION: ${{ github.event.inputs.boot_header_version || '4' }}
          BOOT_CMDLINE: ${{ github.event.inputs.boot_cmdline || github.event.client_payload.boot_cmdline || '' }}
          # 关键修改：指定使用 NDK 的 Clang 编译器
          # NDK r26+ 的 Clang 位于 $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang
          CXX: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++
          # 确保链接器也使用 NDK 的 lld
          LD: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/ld.lld
          # 设置 Android NDK 环境变量供构建脚本使用
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # 验证编译器版本
          $CC --version
          bash scripts/build_our_unlock_poweroff.sh

      - name: Build qemu stage0-probe artifact (NDK Clang)
        env:
          TARGET_REF: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ref || github.event.inputs.target_ref || github.ref }}
          BOOT_HEADER_VERSION: ${{ github.event.inputs.boot_header_version || '4' }}
          BOOT_CMDLINE: ${{ github.event.inputs.boot_cmdline || github.event.client_payload.boot_cmdline || '' }}
          CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang
          CXX: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ 
          LD: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/ld.lld
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          OUT_DIR="${GITHUB_WORKSPACE}/out/unlock-poweroff-stage0-probe" \
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/out/unlock-poweroff-stage0-probe/artifacts" \
          BOOTSHIM_PAYLOAD_SOURCE=stage0_probe \
          BOOTSHIM_STAGE0_MODE=reset \
          bash scripts/build_our_unlock_poweroff.sh

      - name: Summarize generated variants
        run: |
          cat > out/VARIANTS.txt <<'EOF'
          Generated unlock-poweroff variants:
          - out/unlock-poweroff/artifacts
            payload_source=unsigned_abl
            expected path: BootShim -> unsigned_abl ELF

          - out/unlock-poweroff-stage0-probe/artifacts
            payload_source=stage0_probe
            stage0_mode=reset
            expected path: BootShim -> minimal executable stage0 probe
          EOF

      - name: Upload phone artifact
        uses: actions/upload-artifact@v4
        with:
          name: pineapple-unlock-poweroff-phone
          if-no-files-found: error
          path: out/unlock-poweroff/*

      - name: Upload qemu stage0 artifact
        uses: actions/upload-artifact@v4
        with:
          name: pineapple-unlock-poweroff-qemu-stage0-probe
          if-no-files-found: error
          path: out/unlock-poweroff-stage0-probe/*

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pineapple-dualstage-artifacts-ndk
          if-no-files-found: error
          path: out/*
